# ============================================================================
# Methodology summary (≤ 200 words)
# ============================================================================
methodology_summary: |
  Trap-aware hybrid retrieval + LTR ensemble. Stage 1: BM25 (rank_bm25) over
  a per-candidate `deep_profile` text that weights career-history evidence
  above the skill list (the JD explicitly warns against keyword matching).
  Stage 2: a small cross-encoder (`ms-marco-MiniLM-L-6-v2`) reranks the
  hybrid-retrieval shortlist. Stage 3: a LightGBM LambdaRank model
  trained on JD-derived proxy-relevance labels with bucketing to work
  around the 10k-row-per-query limit. Stage 4: ensemble of LTR +
  cross-encoder + behavioral availability + positive JD boosters −
  negative JD filters − honeypot risk. Strictly monotonic scores in
  [0.20, 0.99] with per-rank jitter. Reasoning is generated via a
  feature-driven template at rank time (MiMo v2.5 via Zenmux was used
  in build but the API was unreachable from the run sandbox; the
  template fallback explicitly cites the candidate's strongest positive
  signal and a single honest concern).

# ============================================================================
# Approach notes
# ============================================================================
approach:
  retrieval: "BM25 + small bi-encoder (optional) + RRF + cross-encoder rerank"
  ranking: "LightGBM LambdaRank with 60+ engineered features"
  behavioral_engine: "Vectorized availability score + positive/negative JD filters + honeypot risk"
  reasoning: "Feature-driven template at rank time; LLM portraits at build time when reachable"
  honeypot_detection: "Rule ensemble on skill-proficiency vs duration, YOE vs career-sum, perfect skill list with non-tech title, multiple current positions, expert-in-too-many-skills, all-skills-zero-endorsements, high-skill-count-no-career-evidence"
  artifacts: "bm25.pkl, faiss.index, feature_store.parquet, ltr.cbm (~500 MB total)"
  ranking_budget: "< 120s on 16 GB CPU; well within the 5-min Stage 3 ceiling"

