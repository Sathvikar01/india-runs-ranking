name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Run ruff
        run: ruff check src tests scripts

  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install black
        run: pip install "black>=24.4"
      - name: Run black --check
        run: black --check src tests scripts

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install mypy
        run: pip install "mypy>=1.10" types-PyYAML types-python-dateutil
      - name: Install project (skip heavy ML deps for speed)
        run: |
          pip install pydantic pyyaml jsonschema pandas pyarrow python-dateutil
          pip install -e . --no-deps
      - name: Run mypy
        run: mypy src
